services:
  # === Dashboard (Next.js) ===
  dashboard:
    container_name: hh_dashboard
    build:
      context: dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - dashboard/.env.local
    restart: unless-stopped
    profiles:
      - dashboard

  # === Cron mode (legacy) ===
  hh_applicant_tool:
    container_name: hh_applicant_tool
    image: hh_applicant_tool:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    environment:
      - CONFIG_DIR=/app/config
      - TERM=${TERM}
    profiles:
      - cron

  # === Worker mode (dashboard-driven) ===
  worker:
    container_name: hh_worker
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ${CONFIG_DIR:-./config}:/app/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    env_file:
      - .env.worker
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - CONFIG_DIR=/app/config
      - HH_PROFILE_ID=${HH_PROFILE_ID:-}
    profiles:
      - worker
